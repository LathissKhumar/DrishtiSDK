name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-read-only: ${{ github.ref != 'refs/heads/master' }}

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build
      run: ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx2g" -Dorg.gradle.workers.max=2

    - name: Run tests
      run: ./gradlew testDebugUnitTest --no-daemon -Dorg.gradle.jvmargs="-Xmx2g" -Dorg.gradle.workers.max=2

    - name: Check API compatibility
      run: ./gradlew apiCheck --no-daemon -Dorg.gradle.jvmargs="-Xmx2g" -Dorg.gradle.workers.max=2

    - name: Upload test results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: '**/build/reports/tests/'
        retention-days: 7

    - name: Upload API check results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: api-check-results
        path: '**/build/api/'
        retention-days: 7
