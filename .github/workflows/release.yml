name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Build and Test
      run: ./gradlew assembleDebug testDebugUnitTest apiCheck --no-daemon -Dorg.gradle.jvmargs="-Xmx2g" -Dorg.gradle.workers.max=2

    - name: Generate API docs
      run: ./gradlew dokkaHtmlMultiModule --no-daemon -Dorg.gradle.jvmargs="-Xmx2g" || echo "Dokka docs generation skipped"
      continue-on-error: true

    - name: Upload Dokka docs
      if: success() || steps.last-step.outcome == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: dokka-docs
        path: build/dokka/
        retention-days: 30

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: Drishti SDK ${{ steps.version.outputs.VERSION }}
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
